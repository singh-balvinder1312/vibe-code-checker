# Application
spring.application.name=vibe-code-checker
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/vibechecker
spring.datasource.username=balvindersingh
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=dmliZUNvZGVDaGVja2VyU2VjcmV0S2V5MjAyNFN1cGVyU2VjdXJlS2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9u
app.jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App Info
info.app.name=Vibe Code Compliance Checker
info.app.version=1.0.0
info.app.description=Checks vibe code compliance against coding standards

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Python Analyzer
app.python.script.path=../python-analyzer/analyzer.py

# Logging
logging.level.com.vibechecker=DEBUG
logging.level.org.springframework.security=DEBUG

# Springdoc fix
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.packages-to-scan=com.vibechecker.api.controller